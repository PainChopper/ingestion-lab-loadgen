<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>loadgen</title>
    <style>
        body {
            font-family: monospace;
            margin: 24px 16px;
            color: #222;
        }

        .card {
            border: 1px solid #ccc;
            padding: 8px;
            background: #fff;
        }

        .row {
            margin-bottom: 16px;
        }

        .row label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
        }

        h2 {
            margin: 0 0 16px 0;
            font-size: 20px;
            color: #222;
            text-align: center;
        }

        .slider-container {
            --track-pad: 10px;
            position: relative;
        }

        input[type="range"] {
            width: 100%;
            margin: 0;
            position: relative;
            z-index: 3;
        }

        .slider-ticks {
            position: absolute;
            left: var(--track-pad);
            right: var(--track-pad);
            top: 12px;
            height: 12px;
            pointer-events: none;
            z-index: 2;
            overflow: hidden;
        }

        .slider-ticks .tick {
            position: absolute;
            bottom: 0;
            transform: translateX(-50%);
        }

        .slider-ticks .tick.major {
            width: 1px;
            height: 12px;
            background: #7a7a7a;
            opacity: 0.95;
        }

        .slider-ticks .tick.minor {
            width: 1px;
            height: 4px;
            background: #9a9a9a;
            opacity: 0.85;
        }

        .slider-marks {
            width: calc(100% - (var(--track-pad) * 2));
            margin: 3px 0 0 var(--track-pad);
            height: 14px;
            font-size: 11px;
            color: #666;
            position: relative;
            user-select: none;
        }

        .slider-marks .mark {
            position: absolute;
            transform: translateX(-50%);
            white-space: nowrap;
        }

        .slider-marks .mark:nth-child(1) {
            left: 0%;
        }

        .slider-marks .mark:nth-child(2) {
            left: 10%;
        }

        .slider-marks .mark:nth-child(3) {
            left: 20%;
        }

        .slider-marks .mark:nth-child(4) {
            left: 30%;
        }

        .slider-marks .mark:nth-child(5) {
            left: 40%;
        }

        .slider-marks .mark:nth-child(6) {
            left: 50%;
        }

        .slider-marks .mark:nth-child(7) {
            left: 65.1%;
        }

        .slider-marks .mark:nth-child(8) {
            left: 73.9%;
        }

        .slider-marks .mark:nth-child(9) {
            left: 84.9%;
        }

        .slider-marks .mark:nth-child(10) {
            left: 92.3%;
        }

        .slider-marks .mark:nth-child(11) {
            left: 100%;
        }

        .status {
            margin-top: 12px;
            border-top: 1px dashed #ccc;
            padding-top: 10px;
            white-space: pre-wrap;
        }

        button {
            cursor: pointer;
            padding: 8px 12px;
            border: 1px solid #999;
            background: #eee;
        }

        button:hover {
            background: #ddd;
        }

        .muted {
            color: #666;
        }

        .err {
            color: #b00020;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>Load Generator Control</h2>

        <div class="row">
            <label>Target TPS: <span id="tps-display" class="muted">—</span></label>
            <div class="slider-container">
                <input type="range" id="tps-slider" min="0" max="100000" step="100" value="1000">
                <div class="slider-ticks" aria-hidden="true"></div>
                <div class="slider-marks">
                    <span class="mark">1</span>
                    <span class="mark">10</span>
                    <span class="mark">100</span>
                    <span class="mark">1K</span>
                    <span class="mark">10K</span>
                    <span class="mark">100K</span>
                    <span class="mark">200K</span>
                    <span class="mark">300K</span>
                    <span class="mark">500K</span>
                    <span class="mark">700K</span>
                    <span class="mark">1M</span>
                </div>
            </div>
        </div>

        <div class="row">
            <label>Actual TPS: <span id="actual-tps-display" class="muted">—</span></label>
            <div class="slider-container">
                <input type="range" id="actual-tps-slider" min="0" max="100000" step="100" value="0" disabled>
                <div class="slider-ticks" aria-hidden="true"></div>
                <div class="slider-marks">
                    <span class="mark">1</span>
                    <span class="mark">10</span>
                    <span class="mark">100</span>
                    <span class="mark">1K</span>
                    <span class="mark">10K</span>
                    <span class="mark">100K</span>
                    <span class="mark">200K</span>
                    <span class="mark">300K</span>
                    <span class="mark">500K</span>
                    <span class="mark">700K</span>
                    <span class="mark">1M</span>
                </div>
            </div>
        </div>

        <div class="row">
            <button id="quit-btn" type="button">quit</button>
        </div>

        <div class="row metrics">
            <div>Total Transactions: <span id="total-metric" class="muted">—</span></div>
        </div>

        <div id="status-area" class="status muted">connecting...</div>
    </div>

    <script src="app.js"></script>
</body>

</html>
